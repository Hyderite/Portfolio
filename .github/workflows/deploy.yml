# Build and Restart
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /var/www/${{ github.event.repository.name }}
            
            # 1. Build the environment
            /usr/bin/nixpacks build . --name ${{ github.event.repository.name }}
            
            # 2. Start via pnpm (using the absolute path to the fixed PM2)
            # We use --name to match the PM2 process and -- pnpm start to run the script
            /usr/bin/pm2 delete ${{ github.event.repository.name }} || true
            /usr/bin/pm2 start "pnpm start" --name ${{ github.event.repository.name }}
            
            /usr/bin/pm2 save
          EOF

# Build and Restart natively on the VPS
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/${{ github.event.repository.name }}
            
            # 1. Route traffic through your WARP Proxy
            export http_proxy=http://127.0.0.1:4000
            export https_proxy=http://127.0.0.1:4000
            
            # 2. Use Corepack to invoke pnpm (This bypasses the broken /usr/local/bin symlink)
            # Corepack is built into Node and is much more stable on IPv6/VPS setups
            corepack enable
            
            echo "Starting pnpm install via Corepack..."
            corepack pnpm install
            
            echo "Starting pnpm build..."
            corepack pnpm run build
            
            # 3. Restart the app using PM2
            set +e
            /usr/bin/pm2 delete ${{ github.event.repository.name }}
            set -e

            echo "Starting app with PM2..."
            # Using corepack here ensures PM2 uses the right binary
            /usr/bin/pm2 start "corepack pnpm start" --name ${{ github.event.repository.name }}
            
            /usr/bin/pm2 save
          EOF

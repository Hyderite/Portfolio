name: Deploy App
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cloudflared on Runner
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Setup SSH config for Cloudflare Tunnel
          cat <<EOF > ~/.ssh/config
          Host ${{ secrets.SSH_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}
            StrictHostKeyChecking no
          EOF

          # Sync project files (excluding node_modules so we build fresh on VPS)
          rsync -avz --delete --exclude '.git' --exclude 'node_modules' . ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/${{ github.event.repository.name }}

          # Build and Restart on the VPS
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/${{ github.event.repository.name }}
            
            # 1. Use the ACTUAL proxy port we found (40000)
            export http_proxy=http://127.0.0.1:40000
            export https_proxy=http://127.0.0.1:40000
            
            # 2. Path to the pnpm we just installed to bypass symlink hell
            PNPM_BIN="$HOME/.local/share/pnpm/pnpm"
            
            # 3. Build it natively (No Nixpacks)
            echo "Installing dependencies..."
            $PNPM_BIN install
            
            echo "Running build..."
            $PNPM_BIN run build || echo "No build script found, skipping..."
            
            # 4. Clean start with PM2
            set +e
            /usr/bin/pm2 delete ${{ github.event.repository.name }} || true
            set -e
            
            # Smart start: check for index.js (portfolio) or dist/index.js (aviatrak)
            if [ -f "index.js" ]; then
              /usr/bin/pm2 start index.js --name ${{ github.event.repository.name }}
            else
              /usr/bin/pm2 start dist/index.js --name ${{ github.event.repository.name }}
            fi
            
            /usr/bin/pm2 save
          EOF
